<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon & Icons ──────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest"         href="/site.webmanifest" />

    <!-- ── Primary Meta ────────────────────────────────── -->
    <title>EcoSync — Industrial Sustainability Platform</title>
    <meta name="description"   content="Monitor your global carbon footprint in real-time. EcoSync unifies industrial IoT sensors, carbon tracking, and AI-driven efficiency insights across your entire manufacturing network." />
    <meta name="author"        content="EcoSync" />
    <meta name="keywords"      content="industrial IoT, sustainability, carbon tracking, energy monitoring, net-zero, ESG, factory management" />
    <meta name="theme-color"   content="#10b981" />
    <meta name="color-scheme"  content="dark" />

    <!-- ── Canonical ──────────────────────────────────── -->
    <link rel="canonical" href="https://ecosync.io/" />

    <!-- ── SEO ─────────────────────────────────────────── -->
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Social preview) ────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://ecosync.io/" />
    <meta property="og:title"       content="EcoSync — Industrial Sustainability Platform" />
    <meta property="og:description" content="Sustainability at Scale. Monitor your global footprint in real-time across 450+ facilities." />
    <meta property="og:image"       content="https://ecosync.io/apple-touch-icon.svg" />

    <!-- ── Twitter Card ────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@EcoSyncIO" />
    <meta name="twitter:title"       content="EcoSync — Industrial Sustainability Platform" />
    <meta name="twitter:description" content="Sustainability at Scale. Monitor your global footprint in real-time." />
    <meta name="twitter:image"       content="https://ecosync.io/apple-touch-icon.svg" />

    <!-- ── Fonts ───────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ── Prevent flash of white ──────────────────────── -->
    <style>
      html, body { background: #020617; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
