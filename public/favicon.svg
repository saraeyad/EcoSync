<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="leaf" x1="8" y1="4" x2="26" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle glow behind leaf -->
  <ellipse cx="16" cy="15" rx="9" ry="9" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Leaf shape: a teardrop/leaf pointing top-right -->
  <path
    d="M16 5
       C20 5, 27 8, 27 15
       C27 21, 22 27, 16 27
       C11 27, 8 23, 8 18
       C8 11, 12 5, 16 5Z"
    fill="url(#leaf)"
    opacity="0.95"
  />

  <!-- Leaf midrib (centre vein) -->
  <path
    d="M16 27 C15 23, 13 19, 12 14"
    stroke="#065f46"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.6"
  />

  <!-- ECG / heartbeat pulse line through the leaf -->
  <!-- Represents real-time IoT monitoring -->
  <path
    d="M9 17 L12 17 L13.5 13 L15 21 L16.5 14.5 L17.5 17 L21 17"
    stroke="white"
    stroke-width="1.35"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.92"
  />

  <!-- Small dot at end of pulse = live indicator -->
  <circle cx="21" cy="17" r="1.1" fill="#ffffff" opacity="0.9"/>
  <circle cx="21" cy="17" r="2"   fill="#ffffff" opacity="0.2"/>
</svg>
